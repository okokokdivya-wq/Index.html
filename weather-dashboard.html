<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1e3a8a;
      --secondary: #3b82f6;
      --accent: #60a5fa;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --light: #f3f4f6;
      --dark: #111827;
      --text: #374151;
      --border: #e5e7eb;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      min-height: 100vh;
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 40px;
      color: white;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      font-weight: 700;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    /* Search Section */
    .search-section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-section input {
      flex: 1;
      min-width: 250px;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.3s;
    }

    .search-section input:focus {
      outline: none;
      border-color: var(--secondary);
    }

    .search-section button {
      padding: 12px 28px;
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      font-family: 'Poppins', sans-serif;
    }

    .search-section button:hover {
      background: var(--primary);
      transform: translateY(-2px);
    }

    .search-section button:active {
      transform: translateY(0);
    }

    /* Current Weather Card */
    .current-weather {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .weather-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .location-info h2 {
      font-size: 2rem;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .location-info p {
      color: var(--text);
      font-size: 0.95rem;
    }

    .weather-main {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .weather-icon {
      font-size: 4rem;
    }

    .weather-temp {
      display: flex;
      flex-direction: column;
    }

    .temp-value {
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }

    .weather-description {
      font-size: 1.2rem;
      color: var(--text);
      text-transform: capitalize;
    }

    .weather-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid var(--light);
    }

    .detail-item {
      text-align: center;
    }

    .detail-label {
      color: var(--text);
      font-size: 0.85rem;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .detail-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--secondary);
    }

    /* Hourly Forecast */
    .forecast-section {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .forecast-section h3 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: var(--dark);
    }

    .hourly-forecast {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 15px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .hourly-item {
      background: linear-gradient(135deg, var(--light) 0%, #f9fafb 100%);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .hourly-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .hourly-time {
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .hourly-icon {
      font-size: 2rem;
      margin: 8px 0;
    }

    .hourly-temp {
      font-weight: 700;
      color: var(--secondary);
      font-size: 1rem;
    }

    /* Daily Forecast */
    .daily-forecast {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .daily-item {
      background: linear-gradient(135deg, var(--light) 0%, #f9fafb 100%);
      border-radius: 12px;
      padding: 20px;
      border-left: 4px solid var(--secondary);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .daily-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .daily-date {
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .daily-condition {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .daily-icon {
      font-size: 1.8rem;
    }

    .daily-temps {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .temp-label {
      font-size: 0.85rem;
      color: var(--text);
    }

    .temp-high {
      font-weight: 700;
      color: var(--danger);
    }

    .temp-low {
      font-weight: 700;
      color: var(--accent);
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 40px;
      color: white;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Error State */
    .error {
      background: var(--danger);
      color: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }

    .error.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8rem;
      }

      .weather-main {
        flex-direction: column;
        align-items: flex-start;
      }

      .temp-value {
        font-size: 2.5rem;
      }

      .search-section {
        flex-direction: column;
      }

      .search-section input,
      .search-section button {
        width: 100%;
      }

      .hourly-forecast {
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      }
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 40px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⛅ Weather Dashboard</h1>
      <p>Get real-time weather information for any location</p>
    </header>

    <div class="search-section">
      <input
        type="text"
        id="cityInput"
        placeholder="Enter city name (e.g., London, New York, Tokyo)"
        autocomplete="off"
      />
      <button onclick="searchWeather()">Search</button>
    </div>

    <div class="error" id="errorMessage"></div>

    <div id="loadingContainer" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p>Fetching weather data...</p>
    </div>

    <div id="weatherContainer" style="display: none;">
      <!-- Current Weather -->
      <div class="current-weather">
        <div class="weather-header">
          <div class="location-info">
            <h2 id="cityName"></h2>
            <p id="lastUpdated"></p>
          </div>
          <div class="weather-main">
            <div class="weather-icon" id="weatherIcon"></div>
            <div class="weather-temp">
              <div class="temp-value" id="temperature"></div>
              <div class="weather-description" id="description"></div>
            </div>
          </div>
        </div>

        <div class="weather-details">
          <div class="detail-item">
            <div class="detail-label">💧 Humidity</div>
            <div class="detail-value" id="humidity"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">💨 Wind Speed</div>
            <div class="detail-value" id="windSpeed"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">🌡️ Feels Like</div>
            <div class="detail-value" id="feelsLike"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">🏔️ Pressure</div>
            <div class="detail-value" id="pressure"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">👁️ Visibility</div>
            <div class="detail-value" id="visibility"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">🌍 Coordinates</div>
            <div class="detail-value" id="coordinates"></div>
          </div>
        </div>
      </div>

      <!-- Hourly Forecast -->
      <div class="forecast-section">
        <h3>⏰ Hourly Forecast (Next 24 Hours)</h3>
        <div class="hourly-forecast" id="hourlyForecast"></div>
      </div>

      <!-- Daily Forecast -->
      <div class="forecast-section">
        <h3>📅 7-Day Forecast</h3>
        <div class="daily-forecast" id="dailyForecast"></div>
      </div>
    </div>

    <footer>
      <p>Weather data powered by Open-Meteo API • Geocoding by Nominatim</p>
    </footer>
  </div>

  <script>
    const cityInput = document.getElementById('cityInput');
    const errorMessage = document.getElementById('errorMessage');
    const loadingContainer = document.getElementById('loadingContainer');
    const weatherContainer = document.getElementById('weatherContainer');

    // Weather code to emoji mapping
    const weatherCodes = {
      0: '☀️',
      1: '🌤️',
      2: '⛅',
      3: '☁️',
      45: '🌫️',
      48: '🌫️',
      51: '🌧️',
      53: '🌧️',
      55: '🌧️',
      61: '🌧️',
      63: '🌧️',
      65: '🌧️',
      71: '❄️',
      73: '❄️',
      75: '❄️',
      77: '❄️',
      80: '🌧️',
      81: '🌧️',
      82: '⛈️',
      85: '❄️',
      86: '❄️',
      95: '⛈️',
      96: '⛈️',
      99: '⛈️',
    };

    const weatherDescriptions = {
      0: 'Clear sky',
      1: 'Mainly clear',
      2: 'Partly cloudy',
      3: 'Overcast',
      45: 'Foggy',
      48: 'Depositing rime fog',
      51: 'Light drizzle',
      53: 'Moderate drizzle',
      55: 'Dense drizzle',
      61: 'Slight rain',
      63: 'Moderate rain',
      65: 'Heavy rain',
      71: 'Slight snow',
      73: 'Moderate snow',
      75: 'Heavy snow',
      77: 'Snow grains',
      80: 'Slight rain showers',
      81: 'Moderate rain showers',
      82: 'Violent rain showers',
      85: 'Slight snow showers',
      86: 'Heavy snow showers',
      95: 'Thunderstorm',
      96: 'Thunderstorm with hail',
      99: 'Thunderstorm with hail',
    };

    // Geocode city name to coordinates
    async function geocodeCity(cityName) {
      try {
        const response = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityName)}&format=json&limit=1`
        );
        const data = await response.json();
        if (data.length === 0) throw new Error('City not found');
        return {
          name: data[0].name,
          latitude: parseFloat(data[0].lat),
          longitude: parseFloat(data[0].lon),
        };
      } catch (error) {
        throw new Error('Unable to find city. Please try again.');
      }
    }

    // Fetch weather data from Open-Meteo API
    async function fetchWeather(latitude, longitude, cityName) {
      try {
        const response = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,pressure_msl,visibility&hourly=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=auto`
        );
        const data = await response.json();
        return { ...data, cityName };
      } catch (error) {
        throw new Error('Unable to fetch weather data. Please try again.');
      }
    }

    // Display current weather
    function displayCurrentWeather(data) {
      const current = data.current;
      const timezone = data.timezone;

      document.getElementById('cityName').textContent = data.cityName;
      document.getElementById('lastUpdated').textContent = new Date(
        current.time
      ).toLocaleString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      });

      const weatherCode = current.weather_code;
      document.getElementById('weatherIcon').textContent = weatherCodes[weatherCode] || '🌤️';
      document.getElementById('temperature').textContent = `${Math.round(current.temperature_2m)}°C`;
      document.getElementById('description').textContent = weatherDescriptions[weatherCode] || 'Unknown';
      document.getElementById('humidity').textContent = `${current.relative_humidity_2m}%`;
      document.getElementById('windSpeed').textContent = `${Math.round(current.wind_speed_10m)} km/h`;
      document.getElementById('feelsLike').textContent = `${Math.round(current.apparent_temperature)}°C`;
      document.getElementById('pressure').textContent = `${Math.round(current.pressure_msl)} mb`;
      document.getElementById('visibility').textContent = `${(current.visibility / 1000).toFixed(1)} km`;
      document.getElementById('coordinates').textContent = `${data.latitude.toFixed(2)}°N, ${data.longitude.toFixed(2)}°E`;
    }

    // Display hourly forecast
    function displayHourlyForecast(data) {
      const hourly = data.hourly;
      const hourlyContainer = document.getElementById('hourlyForecast');
      hourlyContainer.innerHTML = '';

      const now = new Date();
      for (let i = 0; i < 24; i++) {
        const time = new Date(now.getTime() + i * 60 * 60 * 1000);
        const temp = hourly.temperature_2m[i];
        const weatherCode = hourly.weather_code[i];

        const hourlyItem = document.createElement('div');
        hourlyItem.className = 'hourly-item';
        hourlyItem.innerHTML = `
          <div class="hourly-time">${time.getHours().toString().padStart(2, '0')}:00</div>
          <div class="hourly-icon">${weatherCodes[weatherCode] || '🌤️'}</div>
          <div class="hourly-temp">${Math.round(temp)}°</div>
        `;
        hourlyContainer.appendChild(hourlyItem);
      }
    }

    // Display daily forecast
    function displayDailyForecast(data) {
      const daily = data.daily;
      const dailyContainer = document.getElementById('dailyForecast');
      dailyContainer.innerHTML = '';

      for (let i = 0; i < 7; i++) {
        const date = new Date(daily.time[i]);
        const maxTemp = daily.temperature_2m_max[i];
        const minTemp = daily.temperature_2m_min[i];
        const weatherCode = daily.weather_code[i];

        const dailyItem = document.createElement('div');
        dailyItem.className = 'daily-item';
        dailyItem.innerHTML = `
          <div class="daily-date">${date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
          <div class="daily-condition">
            <div class="daily-icon">${weatherCodes[weatherCode] || '🌤️'}</div>
            <div>${weatherDescriptions[weatherCode] || 'Unknown'}</div>
          </div>
          <div class="daily-temps">
            <div>
              <div class="temp-label">High</div>
              <div class="temp-high">${Math.round(maxTemp)}°C</div>
            </div>
            <div>
              <div class="temp-label">Low</div>
              <div class="temp-low">${Math.round(minTemp)}°C</div>
            </div>
          </div>
        `;
        dailyContainer.appendChild(dailyItem);
      }
    }

    // Show error message
    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
      setTimeout(() => errorMessage.classList.remove('show'), 5000);
    }

    // Main search function
    async function searchWeather() {
      const city = cityInput.value.trim();
      if (!city) {
        showError('Please enter a city name');
        return;
      }

      loadingContainer.style.display = 'block';
      weatherContainer.style.display = 'none';
      errorMessage.classList.remove('show');

      try {
        const location = await geocodeCity(city);
        const weatherData = await fetchWeather(
          location.latitude,
          location.longitude,
          location.name
        );

        displayCurrentWeather(weatherData);
        displayHourlyForecast(weatherData);
        displayDailyForecast(weatherData);

        loadingContainer.style.display = 'none';
        weatherContainer.style.display = 'block';
      } catch (error) {
        loadingContainer.style.display = 'none';
        showError(error.message);
      }
    }

    // Search on Enter key
    cityInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchWeather();
    });

    // Load default city on page load
    window.addEventListener('load', () => {
      cityInput.value = 'London';
      searchWeather();
    });
  </script>
</body>
</html>
